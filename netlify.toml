[build]
  command = ""
  publish = "public"
  functions = "netlify/functions"

  [build.environment]
    PYTHON_VERSION = "3.11"

[[redirects]]
  from = "/preview_data"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/upload_and_solve"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/download/*"
  to = "/static/download/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
