[build]
  # 如果是纯 Python API（FastAPI/Flask 等），可以不需要 build 命令
  command = ""
  publish = "."                    # 或你的静态文件目录
  functions = "netlify/functions"  # 把你的 .py 函数文件放在这个文件夹里

  # 设置 Python 版本
  environment = { PYTHON_VERSION = "3.11" }

# 可选：重定向所有 API 请求到函数（常见做法）
[[redirects]]
  from = "/preview_data"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/upload_and_solve"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/download/*"
  to = "/static/download/:splat"
  status = 200

# Handle all other routes by the function (if any)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
